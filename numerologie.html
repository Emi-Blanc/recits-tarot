    <script src="../script.js"></script>
    <script>
const NUMEROLOGIE_DATA = {
    base: [
        { num: "1", titre: "Le Pionnier", mot: "Indépendance & Création", desc: "Le commencement, l'élan initial et l'affirmation de soi." },
        { num: "2", titre: "Le Diplomate", mot: "Union & Sensibilité", desc: "Représente l'union, l'écoute et le partenariat." },
        { num: "3", titre: "L'Artiste", mot: "Communication & Expression", desc: "Associé à la communication, la créativité et la joie." },
        { num: "4", titre: "Le Bâtisseur", mot: "Stabilité & Organisation", desc: "Incarne la stabilité, l'organisation et le labeur durable." },
        { num: "5", titre: "L'Aventurier", mot: "Liberté & Mouvement", desc: "Lié à la liberté, au changement et à l'exploration." },
        { num: "6", titre: "L'Affectif", mot: "Harmonie & Équilibre", desc: "Représente l'harmonie, la famille et la recherche du beau." },
        { num: "7", titre: "Le Sage", mot: "Analyse & Sagesse", desc: "Symbole de spiritualité, d'analyse et de focus intérieur." },
        { num: "8", titre: "L'Entrepreneur", mot: "Pouvoir & Réussite", desc: "Associé à l'ambition matérielle et à la justice." },
        { num: "9", titre: "L'Humanitaire", mot: "Altruisme & Achèvement", desc: "Représente la compassion, l'achèvement et la fin d'un cycle." }
    ],
    maitres: [
        { num: "11", titre: "La Force Inspirée", mot: "Intuition & Puissance", desc: "Canal intuitif supérieur mis au service d'une vision." },
        { num: "22", titre: "Le Maître Bâtisseur", mot: "Vision Globale", desc: "L'ancrage et la construction à l'échelle collective." },
        { num: "33", titre: "L'Éveilleur", mot: "Guidance & Transmission", desc: "Le sommet de l'expression vibratoire et du conseil." }
    ]
};

function renderNumGrid(elId, data) {
    const grid = document.getElementById(elId);
    if (!grid) return;
    grid.innerHTML = data.map(n => `
        <div class="num-symbol-block" data-num="${n.num}" data-title="${n.titre}" data-mot="${n.mot}" data-desc="${n.desc.replace(/"/g, '&quot;')}" tabindex="0" role="button" aria-label="Nombre ${n.num}, ${n.titre}">
            <div class="num-digit">${n.num}</div>
            <div class="num-label">${n.titre}</div>
            <div class="num-sub-label">${n.mot}</div>
        </div>`).join('');
}

window.addEventListener('DOMContentLoaded', () => {
    renderNumGrid('grid-numerologie-base', NUMEROLOGIE_DATA.base);
    renderNumGrid('grid-numerologie-maitres', NUMEROLOGIE_DATA.maitres);
});
    </script>
</body>
